<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em breve</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
  background: linear-gradient(135deg, #1f2937, #111827);
  color: #fff;
}
  </style>
</head>

<body class="d-flex align-items-center justify-content-center" style="height:100vh;">

  <div class="text-center">
    <!-- LOGO -->
    <img src="img/franmedio.png" alt="Logo" style="max-width: 150px;" class="mb-4">
    <h2 class="mb-3">O link desse projeto ficará disponível em breve</h2>
    
    <p>Redirecionando em <span id="contador">10</span> segundos...</p>

    <a href="index.html" class="btn btn-dark mt-3">Voltar agora</a>
  </div>

  <script>
    let tempo = 10;
    let contador = document.getElementById("contador");

    let intervalo = setInterval(() => {
      tempo--;
      contador.textContent = tempo;

      if (tempo <= 0) {
        clearInterval(intervalo);
        window.location.href = "index.html";
      }
    }, 1000);
  </script>

</body>
</html>
