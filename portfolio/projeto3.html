<script>
const galeria = document.getElementById("galeria");
const lote = 10;

let imagens = [];
let atual = 0;

// 👉 pega o nome do projeto pela URL
const params = new URLSearchParams(window.location.search);
const projeto = params.get("p");

// 👉 pasta dinâmica (VERSÃO ANTIGA)
const pasta = `../img/${projeto}/`;
async function carregarProjetoInfo() {
const res = await fetch("../projetos.json");
  const dados = await res.json();

  const info = dados[projeto];

  if (!info) {
    document.getElementById("titulo").innerText = "Projeto não encontrado";
    return;
  }

  document.getElementById("titulo").innerText = info.titulo;
  document.getElementById("descricao").innerText = info.descricao;

  // capa
document.getElementById("hero-img").src =
  `../img/${projeto}/${info.capa}`;
}

async function carregarImagens() {
  try {
    const res = await fetch(pasta + "imagens.json");
    imagens = await res.json();

    carregarLote();
  } catch (e) {
    console.error("Erro real:", e);
    galeria.innerHTML = "<p>Erro ao carregar imagens</p>";
  }
}

function carregarLote() {
  let count = 0;

  while (atual < imagens.length && count < lote) {
    let caminho = pasta + imagens[atual];

    let img = new Image();

    img.onload = function () {
      let wrapper = document.createElement("div");
      wrapper.className = "gallery-img";

      img.loading = "lazy";

      wrapper.appendChild(img);
      galeria.appendChild(wrapper);
    };

    img.src = caminho;

    atual++;
    count++;
  }

  if (atual < imagens.length) {
    setTimeout(carregarLote, 300);
  }
}

if (!projeto) {
  galeria.innerHTML = "<p>Projeto não especificado</p>";
  throw new Error("Parâmetro ?p= não informado");
}

carregarProjetoInfo();
carregarImagens();
</script>
