<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="fechar">&times;</span>
  <img id="lightbox-img">
  <a id="download" download>Baixar</a>
</div>

<script>
const galeria = document.getElementById("galeria");
const pasta = "../img/projeto1/";

// 👉 COMEÇA NO NÚMERO REAL DAS SUAS IMAGENS
let atual = 0;

// 👉 LIMITE REAL (596 até 695 = 100 imagens)
const max = 100;

// 👉 QUANTAS CARREGAR POR VEZ
const lote = 10;

function carregarLote() {
  let count = 0;

  while (atual <= max && count < lote) {
    let numero = atual.toString().padStart(4, '0');
    let caminho = `${pasta}IMG_${numero}.jpg`;

    let img = new Image();

    img.onload = function () {
      let wrapper = document.createElement("div");
      wrapper.className = "gallery-img";

      img.loading = "lazy";

      wrapper.appendChild(img);
      galeria.appendChild(wrapper);
    };

    img.onerror = function () {
      // ignora imagens que não existem (evita erro silencioso)
    };

    img.src = caminho;

    atual++;
    count++;
  }

  if (atual <= max) {
    setTimeout(carregarLote, 300); // mais seguro (era 200)
  }
}

carregarLote();

// LIGHTBOX
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const fechar = document.getElementById("fechar");
const download = document.getElementById("download");

// abrir imagem ao clicar
document.addEventListener("click", function(e) {
  if (e.target.tagName === "IMG" && e.target.closest("#galeria")) {
    lightbox.style.display = "flex";
    lightboxImg.src = e.target.src;
    download.href = e.target.src;
  }
});

// fechar
fechar.onclick = () => lightbox.style.display = "none";

// fechar clicando fora
lightbox.onclick = (e) => {
  if (e.target === lightbox) {
    lightbox.style.display = "none";
  }
};
</script>
